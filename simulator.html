<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Simulator for Ley 7/2022</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        #chatbox { width: 100%; max-width: 600px; margin: 20px auto; background: white; border: 1px solid #ddd; border-radius: 5px; overflow: hidden; }
        #messages { height: 400px; overflow-y: scroll; padding: 10px; border-bottom: 1px solid #ddd; }
        #inputArea { display: flex; padding: 10px; }
        #userInput { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        #sendBtn { padding: 10px 20px; border: none; background: #5cb85c; color: white; border-radius: 5px; cursor: pointer; }
        #sendBtn:hover { background: #4cae4c; }
    </style>
</head>
<body>
    <div id="chatbox">
        <div id="messages"></div>
        <div id="inputArea">
            <input type="text" id="userInput" placeholder="Type your message..." />
            <button id="sendBtn">Send</button>
        </div>
    </div>
    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        const responses = {
            "hola": "¡Hola! ¿Cómo puedo ayudarte hoy con la Ley 7/2022?",
            "cuáles son los objetivos": "Los objetivos de la Ley 7/2022 incluyen...",
            "gracias": "¡De nada! Si tienes más preguntas, no dudes en preguntar!",
            "default": "Lo siento, no entiendo tu pregunta. ¿Puedes reformularla?"
        };

        function addMessage(text, isUser = false) {
            const message = document.createElement('div');
            message.textContent = text;
            message.style.textAlign = isUser ? 'right' : 'left';
            messagesDiv.appendChild(message);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        sendBtn.onclick = () => {
            const userMessage = userInput.value.trim();
            if (userMessage) {
                addMessage(userMessage, true);
                userInput.value = '';
                const response = responses[userMessage.toLowerCase()] || responses["default"];
                addMessage(response);
            }
        };

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        });
    </script>
</body>
</html>
